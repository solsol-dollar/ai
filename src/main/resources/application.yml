spring:
  application:
    name: eclipse-ai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  embedding:
    min-summary-length: ${EMBEDDING_MIN_SUMMARY_LENGTH:200}
  rag:
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.7}
    min-news-count: ${RAG_MIN_NEWS_COUNT:3}
    search-window-days: ${RAG_SEARCH_WINDOW_DAYS:365}
  datasource:
    pgvector:
      jdbcUrl: ${PG_URL}
      username: ${PG_USER}
      password: ${PG_PASSWORD}

server:
  port: 8083
