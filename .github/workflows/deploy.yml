name: Deploy AI Pipeline

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/solsol-dollar/eclipse-ai:latest
            ghcr.io/solsol-dollar/eclipse-ai:${{ github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::496009355626:role/eclipse-github-actions-role
          aws-region: ap-northeast-2

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster eclipse-cluster \
            --service eclipse-ai-service \
            --force-new-deployment \
            --region ap-northeast-2
