services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${PG_DB:-ipo_vector}
      POSTGRES_USER: ${PG_USER:-ipo}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/pg-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-ipo} -d ${PG_DB:-ipo_vector}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
